name = "memos-worker"
compatibility_date = "2025-08-19"
main = "src/index.js"
[assets]
directory = "./src/public"
run_worker_first = [
	"/api/*"
]

[[d1_databases]]
binding = "DB"
database_id = "2b61b30e-8ac8-4399-a47f-da13498e92e8"
database_name = "notes-db"

[[kv_namespaces]]
binding = "NOTES_KV"
id = "9f872db6a6ed4ae4b7a215cacc0de8e7"
preview_id = ""

[[r2_buckets]]
binding = "NOTES_R2_BUCKET"
bucket_name = "notes-r2-bucket"
preview_bucket_name = "notes-files-preview"
